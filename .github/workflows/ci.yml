name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-pipeline:
    name: Python — pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest requests python-dotenv
      - run: pytest pipeline/tests/ -v

  python-api:
    name: Python — API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest httpx fastapi snowflake-connector-python python-dotenv requests
      - run: pytest api/tests/ -v

  frontend:
    name: Frontend — Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run test:unit
        working-directory: app
